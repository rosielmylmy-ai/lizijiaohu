<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>墨痕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500&family=Cormorant+Garamond:ital,wght@1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #f4f1ea;
    overflow: hidden;
    font-family: "Noto Serif SC", serif;
    color: #1a1a1a;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Paper texture using layered radial gradients + noise */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(180,160,130,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(140,120,90,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, transparent 0%, rgba(120,100,70,0.04) 100%);
    pointer-events: none;
    z-index: 1;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.35 0 0 0 0 0.25 0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.5;
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 2;
  }

  #stage { position: fixed; inset: 0; z-index: 3; }
  #video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
  }
  #ink {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    mix-blend-mode: multiply;
  }

  /* Minimal corner marks - 篆刻感 */
  .seal-tl, .seal-br {
    position: fixed;
    font-family: "Noto Serif SC", serif;
    font-weight: 300;
    color: rgba(40, 30, 20, 0.4);
    font-size: 11px;
    letter-spacing: 0.4em;
    z-index: 10;
    pointer-events: none;
  }
  .seal-tl {
    top: 28px; left: 28px;
    writing-mode: vertical-rl;
  }
  .seal-br {
    bottom: 28px; right: 28px;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.15em;
  }

  /* Red seal - 红印章 */
  .chop {
    position: fixed;
    bottom: 32px; left: 32px;
    width: 44px; height: 44px;
    background: #a83232;
    color: #f4f1ea;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    font-weight: 500;
    font-family: "Noto Serif SC", serif;
    box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
    z-index: 10;
    opacity: 0.85;
    transform: rotate(-3deg);
  }
  .chop::after {
    content: '';
    position: absolute; inset: -1px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='44' height='44'><filter id='r'><feTurbulence baseFrequency='0.9' numOctaves='1'/><feDisplacementMap in='SourceGraphic' scale='2'/></filter><rect width='100%' height='100%' fill='%23f4f1ea' filter='url(%23r)' opacity='0.35'/></svg>");
    mix-blend-mode: screen;
  }

  /* Start screen */
  .start-screen {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #f4f1ea;
    text-align: center; padding: 24px;
  }
  .start-screen .title {
    font-size: clamp(56px, 14vw, 96px);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #1a1a1a;
    margin-bottom: 8px;
    text-indent: 0.3em;
  }
  .start-screen .subtitle {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.3em;
    color: rgba(40, 30, 20, 0.5);
    margin-bottom: 64px;
    text-transform: lowercase;
  }
  .start-screen .desc {
    font-size: 13px;
    line-height: 2.2;
    color: rgba(40, 30, 20, 0.6);
    margin-bottom: 56px;
    letter-spacing: 0.1em;
  }
  .start-btn {
    padding: 14px 48px;
    font-family: "Noto Serif SC", serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    background: transparent;
    color: #1a1a1a;
    border: none;
    border-top: 1px solid rgba(40, 30, 20, 0.4);
    border-bottom: 1px solid rgba(40, 30, 20, 0.4);
    cursor: pointer;
    transition: all 0.4s;
  }
  .start-btn:hover, .start-btn:active {
    letter-spacing: 0.7em;
    text-indent: 0.7em;
  }
  .start-btn:disabled { opacity: 0.4; cursor: wait; }

  .start-decoration {
    position: absolute;
    width: 1px; height: 80px;
    background: linear-gradient(to bottom, transparent, rgba(40,30,20,0.3), transparent);
  }
  .start-decoration.left { left: 24%; top: 50%; transform: translateY(-50%); }
  .start-decoration.right { right: 24%; top: 50%; transform: translateY(-50%); }

  .err {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #f4f1ea;
    border: 1px solid rgba(40,30,20,0.2);
    padding: 28px 32px;
    max-width: 320px; text-align: center;
    font-size: 13px; line-height: 2;
    z-index: 30; display: none;
    color: #1a1a1a;
  }
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="ink"></canvas>
</div>

<div class="seal-tl">墨 痕 一 笔</div>
<div class="seal-br">ink · trace</div>
<div class="chop">墨</div>

<div class="start-screen" id="start">
  <div class="start-decoration left"></div>
  <div class="start-decoration right"></div>
  <div class="title">墨 痕</div>
  <div class="subtitle">ink trace</div>
  <div class="desc">举 手 之 间 · 墨 随 意 走<br>一 笔 一 画 · 心 印 自 成</div>
  <button class="start-btn" id="start-btn">入 境</button>
</div>

<div class="err" id="err"></div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById('video');
const canvas = document.getElementById('ink');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('start');
const startBtn = document.getElementById('start-btn');
const errEl = document.getElementById('err');

let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ========= 水墨笔触系统 =========
// 不用粒子,用"墨滴"——每一滴都有大小、浓度、扩散
const inkDrops = [];
const MAX_DROPS = 600;

class InkDrop {
  constructor(x, y, size, density, vx = 0, vy = 0) {
    this.x = x; this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.size = size;       // 笔触大小
    this.density = density; // 墨的浓度 0-1
    this.age = 0;
    this.maxAge = 80 + Math.random() * 60; // 扩散时长
    // 不规则形状用多个偏移点模拟
    this.blobs = [];
    const n = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      this.blobs.push({
        ox: (Math.random() - 0.5) * size * 0.6,
        oy: (Math.random() - 0.5) * size * 0.6,
        r: size * (0.4 + Math.random() * 0.6),
        phase: Math.random() * Math.PI * 2,
      });
    }
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.92;
    this.vy *= 0.92;
    this.age++;
  }
  draw() {
    const t = this.age / this.maxAge; // 0->1
    if (t >= 1) return false;

    // 墨随时间扩散变淡
    const spread = 1 + t * 1.8;       // 扩散倍数
    const alpha = this.density * (1 - t) * (1 - t); // 二次衰减,自然

    ctx.globalCompositeOperation = 'multiply';

    // 多层墨晕 - 外层淡、内层浓
    for (const b of this.blobs) {
      const r = b.r * spread;
      const cx = this.x + b.ox * spread;
      const cy = this.y + b.oy * spread;

      // 外晕(淡墨扩散)
      const outer = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.6);
      outer.addColorStop(0, `rgba(20, 18, 15, ${alpha * 0.4})`);
      outer.addColorStop(0.5, `rgba(30, 25, 20, ${alpha * 0.15})`);
      outer.addColorStop(1, `rgba(40, 30, 20, 0)`);
      ctx.fillStyle = outer;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 1.6, 0, Math.PI * 2);
      ctx.fill();

      // 内核(浓墨)
      if (t < 0.6) {
        const inner = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.7);
        inner.addColorStop(0, `rgba(10, 8, 6, ${alpha * 0.8 * (1 - t)})`);
        inner.addColorStop(1, `rgba(20, 15, 10, 0)`);
        ctx.fillStyle = inner;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    return true;
  }
}

// fingertip indices: 4(拇指) 8(食指) 12(中指) 16(无名) 20(小指)
const TIPS = [
  { idx: 4,  weight: 0.5 },   // 拇指 - 较粗
  { idx: 8,  weight: 1.0 },   // 食指 - 主笔
  { idx: 12, weight: 0.7 },
  { idx: 16, weight: 0.5 },
  { idx: 20, weight: 0.4 },   // 小指 - 较细
];

const prev = new Map();

function emitInk(x, y, px, py, weight) {
  const dx = x - px, dy = y - py;
  const dist = Math.hypot(dx, dy);
  if (dist < 0.5) return;

  // 速度越快,笔触越细越急(像快笔)
  // 速度越慢,笔触越粗越浓(像驻笔)
  const speedFactor = Math.min(1, dist / 30);
  const baseSize = (8 + (1 - speedFactor) * 18) * weight;
  const density = 0.4 + (1 - speedFactor) * 0.5;

  // 沿移动方向均匀分布墨滴
  const steps = Math.max(1, Math.floor(dist / 3));
  for (let i = 0; i < steps; i++) {
    if (inkDrops.length >= MAX_DROPS) inkDrops.shift();
    const t = i / steps;
    const ix = px + dx * t + (Math.random() - 0.5) * 2;
    const iy = py + dy * t + (Math.random() - 0.5) * 2;
    // 大小有微抖动,模拟毛笔触纸的不均
    const size = baseSize * (0.7 + Math.random() * 0.5);
    inkDrops.push(new InkDrop(
      ix, iy, size, density,
      (Math.random() - 0.5) * 0.3,
      (Math.random() - 0.5) * 0.3 + 0.1
    ));
  }
}

// ========= MediaPipe =========
let handLandmarker = null;
let lastVideoTime = -1;
let detectionResult = null;

async function setupHandLandmarker() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numHands: 2
  });
}

async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(res => video.onloadedmetadata = res);
  await video.play();
}

// ========= Render loop =========
function render() {
  // 宣纸渐隐效果:每帧轻微淡化已有墨迹,模拟纸张吸收
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = 'rgba(244, 241, 234, 0.015)'; // 极慢淡出,让墨痕保留较久
  ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'source-over';

  if (handLandmarker && video.readyState >= 2) {
    const t = performance.now();
    if (video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      detectionResult = handLandmarker.detectForVideo(video, t);
    }
  }

  if (detectionResult && detectionResult.landmarks) {
    detectionResult.landmarks.forEach((hand, hi) => {
      TIPS.forEach((tip) => {
        const lm = hand[tip.idx];
        const x = (1 - lm.x) * W;
        const y = lm.y * H;
        const key = hi + '-' + tip.idx;
        const p = prev.get(key);
        if (p) {
          emitInk(x, y, p.x, p.y, tip.weight);
        }
        prev.set(key, { x, y });
      });
    });
    if (detectionResult.landmarks.length === 0) prev.clear();
    if (detectionResult.landmarks.length < 2) {
      for (const k of prev.keys()) {
        if (k.startsWith('1-')) prev.delete(k);
      }
    }
  } else {
    prev.clear();
  }

  // 绘制墨滴(从老到新,让新墨盖在上面)
  for (let i = inkDrops.length - 1; i >= 0; i--) {
    const alive = inkDrops[i].update !== undefined;
    inkDrops[i].update();
    const keep = inkDrops[i].draw();
    if (!keep) inkDrops.splice(i, 1);
  }

  requestAnimationFrame(render);
}

async function start() {
  try {
    startBtn.disabled = true;
    startBtn.textContent = '研 墨';
    await setupHandLandmarker();
    await setupCamera();
    startScreen.style.transition = 'opacity 0.8s';
    startScreen.style.opacity = '0';
    setTimeout(() => startScreen.style.display = 'none', 800);
    requestAnimationFrame(render);
  } catch (e) {
    console.error(e);
    errEl.style.display = 'block';
    errEl.innerHTML = '难 入 此 境<br><br>' +
      '<span style="opacity:0.6;font-size:12px;letter-spacing:0.05em">' +
      (e.message || e) +
      '<br><br>请确认摄像头权限<br>并以 https 方式访问</span>';
    startBtn.disabled = false;
    startBtn.textContent = '再 试';
  }
}

startBtn.addEventListener('click', start);
</script>

</body>
</html>
