<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>粒子手势流光</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
    color: #fff;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #stage { position: fixed; inset: 0; }
  #video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror */
    opacity: 0.25;
    filter: contrast(1.05) saturate(0.6);
  }
  #fx {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .hud {
    position: fixed; top: 16px; left: 16px; right: 16px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
    z-index: 5;
  }
  .badge {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 12px; border-radius: 100px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .badge .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #ff5a5a; margin-right: 8px; vertical-align: middle;
    box-shadow: 0 0 8px #ff5a5a;
    animation: pulse 1.4s infinite;
  }
  .badge.ready .dot { background: #5affb0; box-shadow: 0 0 8px #5affb0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .palette {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px;
    z-index: 5; pointer-events: auto;
  }
  .swatch {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .swatch.active { border-color: #fff; transform: scale(1.15); }

  .start-screen {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #1a1530 0%, #000 70%);
    text-align: center; padding: 24px;
  }
  .start-screen h1 {
    font-size: clamp(28px, 7vw, 44px);
    font-weight: 200; letter-spacing: 0.05em;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fff 0%, #b8a4ff 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .start-screen p {
    font-size: 14px; color: rgba(255,255,255,0.55);
    max-width: 280px; line-height: 1.7;
    margin-bottom: 32px;
  }
  .start-btn {
    padding: 14px 36px; font-size: 14px;
    letter-spacing: 0.2em; text-transform: uppercase;
    background: transparent; color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 100px; cursor: pointer;
    transition: all 0.3s;
  }
  .start-btn:hover, .start-btn:active {
    background: rgba(255,255,255,0.1);
    border-color: #fff;
  }
  .hint {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    z-index: 5; pointer-events: none;
    text-align: center;
  }
  .err {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(40,0,0,0.8); border: 1px solid rgba(255,80,80,0.4);
    padding: 20px 24px; border-radius: 12px;
    max-width: 320px; text-align: center;
    font-size: 13px; line-height: 1.6;
    z-index: 30; display: none;
  }
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="fx"></canvas>
</div>

<div class="hud">
  <div class="badge" id="status"><span class="dot"></span><span id="status-text">摄像头未启动</span></div>
  <div class="badge" id="fps">— FPS</div>
</div>

<div class="hint" id="hint">举起手 · 移动指尖</div>

<div class="palette" id="palette">
  <div class="swatch active" data-hue="270" style="background: linear-gradient(135deg,#b8a4ff,#7e5cff)"></div>
  <div class="swatch" data-hue="180" style="background: linear-gradient(135deg,#7ef0e8,#3aa9ff)"></div>
  <div class="swatch" data-hue="330" style="background: linear-gradient(135deg,#ffb4d8,#ff5ea8)"></div>
  <div class="swatch" data-hue="40"  style="background: linear-gradient(135deg,#ffe4a0,#ff9740)"></div>
  <div class="swatch" data-hue="120" style="background: linear-gradient(135deg,#b6ffb8,#3affb0)"></div>
</div>

<div class="start-screen" id="start">
  <h1>粒子流光</h1>
  <p>用摄像头追踪你的手<br>每根指尖都会拖出一道光</p>
  <button class="start-btn" id="start-btn">开始 · Start</button>
</div>

<div class="err" id="err"></div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById('video');
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('status-text');
const fpsEl = document.getElementById('fps');
const startScreen = document.getElementById('start');
const startBtn = document.getElementById('start-btn');
const errEl = document.getElementById('err');
const palette = document.getElementById('palette');

let activeHue = 270;
palette.addEventListener('click', e => {
  const s = e.target.closest('.swatch');
  if (!s) return;
  document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
  s.classList.add('active');
  activeHue = +s.dataset.hue;
});

let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ===== Particle system =====
const particles = [];
const MAX_PARTICLES = 1200;

class Particle {
  constructor(x, y, hue, vx = 0, vy = 0) {
    this.x = x; this.y = y;
    this.vx = vx + (Math.random() - 0.5) * 1.2;
    this.vy = vy + (Math.random() - 0.5) * 1.2 - 0.3;
    this.life = 1;
    this.decay = 0.012 + Math.random() * 0.018;
    this.size = 1.5 + Math.random() * 3;
    this.hue = hue + (Math.random() - 0.5) * 30;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.vy -= 0.05; // slight rise like embers
    this.life -= this.decay;
  }
  draw() {
    const a = Math.max(0, this.life);
    ctx.globalCompositeOperation = 'lighter';
    const r = this.size * (0.5 + a * 0.8);
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
    grd.addColorStop(0, `hsla(${this.hue}, 100%, 75%, ${a})`);
    grd.addColorStop(0.4, `hsla(${this.hue}, 100%, 55%, ${a * 0.4})`);
    grd.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `hsla(${this.hue}, 100%, 90%, ${a})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
}

// fingertip indices in MediaPipe Hand (21 landmarks)
// 4=thumb, 8=index, 12=middle, 16=ring, 20=pinky
const TIPS = [4, 8, 12, 16, 20];

// per-fingertip previous positions (for velocity-based emission)
const prev = new Map(); // key: handIdx + '-' + tipIdx -> {x, y}

function emitTrail(x, y, px, py, hue) {
  const dx = x - px, dy = y - py;
  const dist = Math.hypot(dx, dy);
  const count = Math.min(8, 2 + Math.floor(dist / 4));
  for (let i = 0; i < count; i++) {
    const t = i / count;
    const ix = px + dx * t;
    const iy = py + dy * t;
    if (particles.length < MAX_PARTICLES) {
      particles.push(new Particle(ix, iy, hue, dx * 0.08, dy * 0.08));
    }
  }
}

// ===== MediaPipe =====
let handLandmarker = null;
let lastVideoTime = -1;
let detectionResult = null;

async function setupHandLandmarker() {
  statusText.textContent = '加载模型...';
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numHands: 2
  });
}

async function setupCamera() {
  statusText.textContent = '请求摄像头...';
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: 'user',
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(res => video.onloadedmetadata = res);
  await video.play();
}

// ===== Render loop =====
let frames = 0, lastFpsT = performance.now();

function render() {
  // motion blur fade
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
  ctx.fillRect(0, 0, W, H);

  // detect
  if (handLandmarker && video.readyState >= 2) {
    const t = performance.now();
    if (video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      detectionResult = handLandmarker.detectForVideo(video, t);
    }
  }

  // emit from fingertips
  if (detectionResult && detectionResult.landmarks) {
    detectionResult.landmarks.forEach((hand, hi) => {
      const hueBase = activeHue + hi * 40;
      TIPS.forEach((tipIdx, fi) => {
        const lm = hand[tipIdx];
        // mirror x to match the mirrored video
        const x = (1 - lm.x) * W;
        const y = lm.y * H;
        const key = hi + '-' + tipIdx;
        const p = prev.get(key);
        const hue = hueBase + fi * 8;
        if (p) {
          emitTrail(x, y, p.x, p.y, hue);
        } else {
          if (particles.length < MAX_PARTICLES) {
            particles.push(new Particle(x, y, hue));
          }
        }
        prev.set(key, { x, y });
      });
    });
    // clear stale entries when fewer hands
    if (detectionResult.landmarks.length < 2) {
      for (const k of prev.keys()) {
        if (k.startsWith('1-')) prev.delete(k);
      }
    }
    if (detectionResult.landmarks.length === 0) prev.clear();
  }

  // update + draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    if (p.life <= 0) {
      particles.splice(i, 1);
    } else {
      p.draw();
    }
  }
  ctx.globalCompositeOperation = 'source-over';

  // fps
  frames++;
  const now = performance.now();
  if (now - lastFpsT > 500) {
    const fps = Math.round((frames * 1000) / (now - lastFpsT));
    fpsEl.textContent = fps + ' FPS · ' + particles.length + ' p';
    frames = 0; lastFpsT = now;
  }

  requestAnimationFrame(render);
}

async function start() {
  try {
    startBtn.disabled = true;
    startBtn.textContent = '加载中...';
    await setupHandLandmarker();
    await setupCamera();
    startScreen.style.transition = 'opacity 0.6s';
    startScreen.style.opacity = '0';
    setTimeout(() => startScreen.style.display = 'none', 600);
    statusEl.classList.add('ready');
    statusText.textContent = '追踪中';
    requestAnimationFrame(render);
    setTimeout(() => {
      document.getElementById('hint').style.transition = 'opacity 1s';
      document.getElementById('hint').style.opacity = '0';
    }, 4000);
  } catch (e) {
    console.error(e);
    errEl.style.display = 'block';
    errEl.innerHTML = '启动失败<br><br>' +
      '<span style="opacity:0.7;font-size:12px">' +
      (e.message || e) +
      '<br><br>请检查:<br>· 摄像头权限是否开启<br>· 网页是否通过 https 打开<br>· 网络是否能访问 jsdelivr / googleapis</span>';
    startBtn.disabled = false;
    startBtn.textContent = '重试';
  }
}

startBtn.addEventListener('click', start);
</script>

</body>
</html>
